{% extends "base.html" %}
{% block title %}New Session{% endblock %}
{% block content %}
<section class="new-session-page">
  <section class="panel session-create-panel">
    <div class="panel-head">
      <h2>Create Session</h2>
      <p class="muted">Start a single TX/RX range-test session draft.</p>
    </div>
    <form method="post" action="/sessions" class="stack session-create-form">
      <label class="wide-field">
        <span>Name</span>
        <input type="text" name="name" required placeholder="Field test 2026-03-20" />
      </label>
      <label>
        <span>Stop Mode</span>
        <select name="stop_mode">
          <option value="default_duration">Default duration</option>
          <option value="fixed_duration">Fixed duration</option>
          <option value="manual">Manual stop</option>
        </select>
      </label>
      <label>
        <span>Duration Minutes</span>
        <input type="number" min="1" name="selected_duration_minutes" value="{{ default_duration }}" />
      </label>
      <label>
        <span>Location Mode</span>
        <select name="location_mode">
          <option value="none">None</option>
          <option value="manual">Manual text</option>
          <option value="browser_geo">Browser geolocation</option>
        </select>
      </label>
      <label>
        <span>Location</span>
        <input type="text" name="location_text" placeholder="Mountain pass mile 14" />
      </label>
      <label class="wide-field">
        <span>Initial Notes</span>
        <textarea name="initial_notes" rows="6" placeholder="Operator notes, environment, antenna setup, expected route."></textarea>
      </label>
      <button type="submit" class="wide-field">Create Session</button>
    </form>
  </section>
</section>
{% endblock %}
