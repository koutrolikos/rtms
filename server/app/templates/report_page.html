{% extends "base.html" %}
{% block title %}Report{% endblock %}
{% block content %}
{% from "_summary.html" import render_copy_value %}
<section class="panel">
  <div class="panel-head">
    <div>
      <h2>HTML Report</h2>
      <div class="panel-inline-meta">
        <span class="hero-meta-label">Session ID</span>
        {{ render_copy_value(session.id, session.id, "session id") }}
      </div>
    </div>
    <a class="button secondary" href="/sessions/{{ session.id }}">Back to Session</a>
  </div>
  <div class="report-shell">
    {{ report_html | safe }}
  </div>
</section>
{% endblock %}
